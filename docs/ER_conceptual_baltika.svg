<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 720" width="1040" height="720" font-family="Segoe UI, Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a365d"/>
    </marker>
    <marker id="arrP" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#805ad5"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#fafcff"/>
  <text x="520" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1a365d">Концептуальная модель данных</text>
  <text x="520" y="48" text-anchor="middle" font-size="10.5" fill="#4a5568">БД «Балтика»: сущности и кардинальности (таблицы PostgreSQL)</text>

  <!-- Справочники к судну -->
  <rect x="24" y="64" width="178" height="92" rx="6" fill="#fff8e6" stroke="#c05621" stroke-width="1.5"/>
  <text x="113" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#744210">Справочники</text>
  <text x="113" y="106" text-anchor="middle" font-size="9.5" fill="#4a5568">тип судна, верфь, капитан</text>
  <text x="113" y="124" text-anchor="middle" font-size="8" fill="#718096">ship_types · dockyards · captains</text>
  <path d="M 400 128 L 202 128" fill="none" stroke="#805ad5" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrP)"/>
  <text x="285" y="122" font-size="9.5" fill="#553c9a" stroke="#fafcff" stroke-width="2.5" paint-order="stroke fill">N:1</text>

  <!-- Судно -->
  <rect x="400" y="84" width="200" height="80" rx="6" fill="#e8f4fc" stroke="#0f4c81" stroke-width="2"/>
  <text x="500" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#0f4c81">Судно</text>
  <text x="500" y="128" text-anchor="middle" font-size="9" fill="#4a5568">home_port_id: порт приписки</text>
  <text x="500" y="146" text-anchor="middle" font-size="8" fill="#718096">ships</text>

  <!-- Рейс -->
  <rect x="400" y="228" width="200" height="96" rx="6" fill="#e8f4fc" stroke="#0f4c81" stroke-width="2"/>
  <text x="500" y="254" text-anchor="middle" font-size="13" font-weight="600" fill="#0f4c81">Рейс</text>
  <text x="500" y="272" text-anchor="middle" font-size="9" fill="#4a5568">даты, таможня, оформление</text>
  <text x="500" y="288" text-anchor="middle" font-size="8.5" fill="#4a5568">origin_port_id, destination_port_id → Порт</text>
  <text x="500" y="306" text-anchor="middle" font-size="8" fill="#718096">shipments</text>

  <!-- Груз -->
  <rect x="400" y="392" width="200" height="78" rx="6" fill="#e8f4fc" stroke="#0f4c81" stroke-width="2"/>
  <text x="500" y="420" text-anchor="middle" font-size="13" font-weight="600" fill="#0f4c81">Груз</text>
  <text x="500" y="440" text-anchor="middle" font-size="8" fill="#718096">cargo</text>

  <!-- Вертикальные связи: подписи справа от линии -->
  <line x1="500" y1="164" x2="500" y2="228" stroke="#1a365d" stroke-width="2" marker-end="url(#arr)"/>
  <text x="512" y="188" font-size="12" font-weight="700" fill="#c53030" stroke="#fafcff" stroke-width="2.5" paint-order="stroke fill">1</text>
  <text x="512" y="208" font-size="12" font-weight="700" fill="#c53030" stroke="#fafcff" stroke-width="2.5" paint-order="stroke fill">N</text>

  <line x1="500" y1="324" x2="500" y2="392" stroke="#1a365d" stroke-width="2" marker-end="url(#arr)"/>
  <text x="512" y="348" font-size="12" font-weight="700" fill="#c53030" stroke="#fafcff" stroke-width="2.5" paint-order="stroke fill">1</text>
  <text x="512" y="368" font-size="12" font-weight="700" fill="#c53030" stroke="#fafcff" stroke-width="2.5" paint-order="stroke fill">N</text>

  <!-- Отправитель -->
  <rect x="24" y="380" width="176" height="96" rx="6" fill="#edf7ed" stroke="#276749" stroke-width="1.5"/>
  <text x="112" y="406" text-anchor="middle" font-size="12" font-weight="600" fill="#22543d">Отправитель</text>
  <text x="112" y="424" text-anchor="middle" font-size="9" fill="#4a5568">наименование, ИНН</text>
  <text x="112" y="442" text-anchor="middle" font-size="8" fill="#718096">senders</text>
  <line x1="200" y1="428" x2="400" y2="434" stroke="#1a365d" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="248" y="422" font-size="12" font-weight="700" fill="#c53030" stroke="#fafcff" stroke-width="2.5" paint-order="stroke fill">1</text>
  <text x="340" y="430" font-size="12" font-weight="700" fill="#c53030" stroke="#fafcff" stroke-width="2.5" paint-order="stroke fill">N</text>

  <!-- Получатель (сдвинут вправо, поля для 1 и N) -->
  <rect x="840" y="380" width="176" height="96" rx="6" fill="#edf7ed" stroke="#276749" stroke-width="1.5"/>
  <text x="928" y="406" text-anchor="middle" font-size="12" font-weight="600" fill="#22543d">Получатель</text>
  <text x="928" y="424" text-anchor="middle" font-size="9" fill="#4a5568">наименование, ИНН</text>
  <text x="928" y="442" text-anchor="middle" font-size="8" fill="#718096">consignees</text>
  <line x1="840" y1="428" x2="600" y2="434" stroke="#1a365d" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="640" y="430" font-size="12" font-weight="700" fill="#c53030" stroke="#fafcff" stroke-width="2.5" paint-order="stroke fill">N</text>
  <text x="800" y="422" font-size="12" font-weight="700" fill="#c53030" stroke="#fafcff" stroke-width="2.5" paint-order="stroke fill">1</text>

  <!-- Порт -->
  <rect x="400" y="528" width="200" height="64" rx="6" fill="#fef5f5" stroke="#9b2c2c" stroke-width="1.5"/>
  <text x="500" y="556" text-anchor="middle" font-size="12" font-weight="600" fill="#742a2a">Порт</text>
  <text x="500" y="574" text-anchor="middle" font-size="8" fill="#718096">ports</text>

  <path d="M 440 312 L 320 312 L 320 528 L 440 528" fill="none" stroke="#9b2c2c" stroke-width="1.2" stroke-dasharray="5,3"/>
  <path d="M 560 312 L 680 312 L 680 528 L 560 528" fill="none" stroke="#9b2c2c" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="300" y="418" font-size="9" fill="#742a2a" transform="rotate(-90 300,418)">отправление</text>
  <text x="700" y="418" font-size="9" fill="#742a2a" transform="rotate(90 700,418)">назначение</text>
  <text x="332" y="302" font-size="9.5" fill="#742a2a" stroke="#fff" stroke-width="2" paint-order="stroke fill">M:1</text>
  <text x="648" y="302" font-size="9.5" fill="#742a2a" stroke="#fff" stroke-width="2" paint-order="stroke fill">M:1</text>

  <!-- Приписка: обход слева -->
  <path d="M 420 124 L 260 124 L 260 560 L 440 560" fill="none" stroke="#9b2c2c" stroke-width="1.1" stroke-dasharray="6,4"/>
  <text x="238" y="360" font-size="9.5" fill="#742a2a" stroke="#fff" stroke-width="2" paint-order="stroke fill">N:1</text>
  <text x="238" y="376" font-size="8.5" fill="#742a2a">приписка</text>

  <!-- Адрес -->
  <rect x="400" y="612" width="200" height="44" rx="4" fill="#f3e8ff" stroke="#553c9a" stroke-width="1.3"/>
  <text x="500" y="636" text-anchor="middle" font-size="11.5" font-weight="600" fill="#44337a">Адрес</text>
  <text x="500" y="652" text-anchor="middle" font-size="8" fill="#718096">addresses</text>
  <line x1="500" y1="592" x2="500" y2="612" stroke="#553c9a" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="512" y="606" font-size="9.5" fill="#553c9a" stroke="#fafcff" stroke-width="2" paint-order="stroke fill">N:1</text>
  <text x="500" y="698" text-anchor="middle" font-size="8" fill="#718096">порт ссылается на адрес порта</text>

  <!-- Прочие справочники: ниже получателя, не на краю -->
  <rect x="800" y="520" width="216" height="128" rx="6" fill="#fff8e6" stroke="#c05621" stroke-width="1.5"/>
  <text x="908" y="544" text-anchor="middle" font-size="11" font-weight="600" fill="#744210">Прочие справочники</text>
  <text x="908" y="562" text-anchor="middle" font-size="9" fill="#4a5568">банк — отправитель и получатель</text>
  <text x="908" y="578" text-anchor="middle" font-size="9" fill="#4a5568">ед. измерения — груз</text>
  <text x="908" y="596" text-anchor="middle" font-size="7.5" fill="#718096">banks, units (FK N:1)</text>
  <path d="M 112 380 L 112 300 L 800 300 L 800 520" fill="none" stroke="#805ad5" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrP)"/>
  <text x="420" y="292" font-size="8.5" fill="#553c9a" stroke="#fafcff" stroke-width="2" paint-order="stroke fill">N:1</text>
  <path d="M 928 380 L 928 340 L 1000 340 L 1000 520" fill="none" stroke="#805ad5" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrP)"/>
  <text x="962" y="448" font-size="8.5" fill="#553c9a" stroke="#fafcff" stroke-width="2" paint-order="stroke fill">N:1</text>
  <path d="M 600 430 L 720 430 L 800 520" fill="none" stroke="#805ad5" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrP)"/>
  <text x="688" y="424" font-size="8.5" fill="#553c9a" stroke="#fafcff" stroke-width="2" paint-order="stroke fill">N:1</text>

  <!-- Легенда -->
  <rect x="24" y="508" width="248" height="120" rx="4" fill="#ffffff" stroke="#cbd5e0" stroke-width="1"/>
  <text x="36" y="530" font-size="10.5" font-weight="600" fill="#2d3748">Условные обозначения</text>
  <line x1="36" y1="546" x2="76" y2="546" stroke="#1a365d" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="82" y="550" font-size="8.5" fill="#4a5568">основная связь (1:N)</text>
  <line x1="36" y1="564" x2="76" y2="564" stroke="#805ad5" stroke-dasharray="4,2" stroke-width="1" marker-end="url(#arrP)"/>
  <text x="82" y="568" font-size="8.5" fill="#4a5568">к справочнику (N:1)</text>
  <line x1="36" y1="582" x2="76" y2="582" stroke="#9b2c2c" stroke-dasharray="4,2" stroke-width="1"/>
  <text x="82" y="586" font-size="8.5" fill="#4a5568">рейс — порт; судно — приписка</text>
  <line x1="36" y1="600" x2="76" y2="600" stroke="#553c9a" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="82" y="604" font-size="8.5" fill="#4a5568">порт — адрес</text>
</svg>
