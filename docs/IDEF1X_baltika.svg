  <text x="36" y="1108" font-size="8.5" fill="#475569">Прямоугольник с прямыми углами — независимая сущность (ключи только свои); скруглённые углы — сущность с внешними FK в зоне атрибутов.</text>
  <text x="36" y="1124" font-size="8.5" fill="#475569">Связь ненидентифицирующая (пунктир): внешний ключ не входит в первичный ключ (суррогатные SERIAL везде).</text>
  <text x="36" y="1140" font-size="8.5" fill="#475569">Сплошная линия: основная цепочка «Судно → Рейс → Груз». Источник: sql/deploy/02_schema.sql.</text>
  <text x="36" y="1156" font-size="8" fill="#64748b">«...» — служебные поля created_at / updated_at для краткости.</text>

